<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Salimos? ✨</title>
    <!-- Incluimos Canvas-Confetti para la explosión del final -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #121214;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            overflow: hidden;
            position: relative;
        }

        /* Corazones flotantes de fondo */
        .bg-heart {
            position: absolute;
            color: rgba(255, 75, 110, 0.4);
            font-size: 20px;
            animation: floatUp 6s linear infinite;
            bottom: -50px;
            z-index: 1;
            user-select: none;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(-105vh) translateX(50px) rotate(360deg);
                opacity: 0;
            }
        }

        /* Contenedor Principal */
        .card {
            background: #1a1a1e;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 450px;
            width: 90%;
            z-index: 10;
            border: 1px solid #2a2a30;
            transition: all 0.5s ease;
        }

        /* Estilo del Gatito */
        .gif-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            position: relative;
        }

        .cat-emoji {
            font-size: 100px;
            line-height: 120px;
            animation: bounce 1.5s ease infinite alternate;
        }

        .cat-hearts {
            position: absolute;
            top: 10px;
            left: 0;
            right: 0;
            font-size: 24px;
            animation: pulse 0.8s ease infinite alternate;
        }

        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.7; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        h1 {
            font-size: 26px;
            margin-bottom: 30px;
            color: #fff;
            line-height: 1.4;
        }

        /* Botones */
        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            height: 60px;
            position: relative;
        }

        button {
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #yesBtn {
            background: linear-gradient(135deg, #ff4b6e, #ff758c);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 75, 110, 0.4);
        }

        #yesBtn:active {
            transform: scale(0.95);
        }

        #noBtn {
            background-color: #2a2a30;
            color: #a0a0a5;
            border: 1px solid #3a3a42;
            position: absolute;
            z-index: 999;
            transition: all 0.1s ease;
            touch-action: none; /* Evita zoom al tocar en móvil */
        }

        /* Pantalla de Confirmación */
        .success-message {
            display: none;
        }

        .success-message h2 {
            color: #ff4b6e;
            font-size: 28px;
            margin-bottom: 20px;
        }

        .info-box {
            background: #222227;
            padding: 20px;
            border-radius: 15px;
            border-left: 4px solid #ff4b6e;
            text-align: left;
            margin-top: 15px;
        }

        .info-item {
            margin-bottom: 10px;
            font-size: 16px;
        }

        .info-item:last-child {
            margin-bottom: 0;
        }

        .info-item strong {
            color: #ff758c;
        }
    </style>
</head>
<body>

    <!-- Contenedor de la invitación -->
    <div class="card" id="mainCard">
        <!-- Gatito Cute con corazones -->
        <div class="gif-container">
            <div class="cat-hearts">💝💖💘</div>
            <div class="cat-emoji">🐱</div>
        </div>

        <!-- Pregunta inicial -->
        <div id="quizSection">
            <h1>¡Hola! Te tengo una pregunta importante... <br>¿Saldrías conmigo a una cita? 🗺️✨</h1>
            <div class="btn-container">
                <button id="yesBtn" onclick="celebrar()">¡SÍ! 🎉</button>
                <button id="noBtn" onmouseover="huir(this)" ontouchstart="huir(this)">No 😢</button>
            </div>
        </div>

        <!-- Sección oculta del resultado -->
        <div class="success-message" id="successSection">
            <h2>¡Siií! Sabía que dirías que sí 🥰 🎉</h2>
            <p>Preparé los detalles para que no tengas que preocuparte por nada:</p>
            
            <div class="info-box">
                <div class="info-item">📍 <strong>Punto de recogida:</strong> Torre Millennium</div>
                <div class="info-item">🕛 <strong>Hora:</strong> Al mediodía (12:00 PM)</div>
            </div>
        </div>
    </div>

    <script>
        // 1. Generador de corazones flotantes continuos en el fondo
        function crearCorazonesDeFondo() {
            const corazones = ['❤️', '💖', '💝', '💕', '💘'];
            setInterval(() => {
                const corazon = document.createElement('div');
                corazon.classList.add('bg-heart');
                corazon.innerText = corazones[Math.floor(Math.random() * corazones.length)];
                
                // Posición horizontal aleatoria y tamaño aleatorio
                corazon.style.left = Math.random() * 100 + 'vw';
                corazon.style.fontSize = Math.random() * (30 - 15) + 15 + 'px';
                
                // Velocidad de animación aleatoria
                corazon.style.animationDuration = Math.random() * (7 - 4) + 4 + 's';
                
                document.body.appendChild(corazon);
                
                // Eliminar el elemento después de que termine la animación
                setTimeout(() => {
                    corazon.remove();
                }, 7000);
            }, 300); // Aparece un corazón cada 300ms
        }

        // Iniciar la lluvia de fondo inmediatamente al cargar la página
        crearCorazonesDeFondo();

        // 2. Función para que el botón "No" sea imposible de presionar
        function huir(boton) {
            // Calculamos límites seguros para que el botón no se salga completamente de la pantalla visible
            const padding = 20;
            const maxX = window.innerWidth - boton.offsetWidth - padding;
            const maxY = window.innerHeight - boton.offsetHeight - padding;

            // Generar coordenadas aleatorias
            let randomX = Math.floor(Math.random() * (maxX - padding)) + padding;
            let randomY = Math.floor(Math.random() * (maxY - padding)) + padding;

            // Aplicar la nueva posición absoluta
            boton.style.position = 'fixed';
            boton.style.left = randomX + 'px';
            boton.style.top = randomY + 'px';
        }

        // 3. Función al dar clic en "SÍ" (Explosión y Mensaje)
        function celebrar() {
            // Ocultamos la pregunta y mostramos la dirección
            document.getElementById('quizSection').style.display = 'none';
            document.getElementById('successSection').style.display = 'block';
            
            // Cambiamos el gatito a un modo aún más feliz
            document.querySelector('.cat-emoji').innerText = '😸';
            document.querySelector('.cat-hearts').innerText = '🎉✨🥳';

            // Configuración de la explosión masiva con canvas-confetti
            const duration = 4 * 1000;
            const end = Date.now() + duration;

            // Mezcla de corazones y confeti de fiesta
            (function frame() {
                // Confeti de colores de fiesta
                confetti({
                    particleCount: 4,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0, y: 0.8 }
                });
                confetti({
                    particleCount: 4,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1, y: 0.8 }
                });

                // Lanzamiento desde el centro para simular corazones flotantes explosivos
                confetti({
                    particleCount: 2,
                    spread: 80,
                    origin: { x: 0.5, y: 0.6 },
                    colors: ['#ff4b6e', '#ff758c', '#ff003c']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>
</body>
</html>
