<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>💖 Una pregunta importante</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #ffe6f0;
      text-align: center;
      padding-top: 100px;
      overflow: hidden;
      height: 100vh;
    }

    h1 {
      color: #ff4d88;
      font-size: 40px;
    }

    .buttons {
      margin-top: 40px;
    }

    button {
      font-size: 20px;
      padding: 12px 25px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
      position: relative;
    }

    #yes {
      background: #4CAF50;
      color: white;
    }

    #no {
      background: #ff4d4d;
      color: white;
      position: absolute;
    }

    #message {
      margin-top: 40px;
      font-size: 24px;
      color: #333;
      min-height: 40px;
    }
  </style>
</head>

<body>

  <h1>¿Quieres salir conmigo? 💕</h1>

  <div class="buttons">
    <button id="yes">Sí 💖</button>
    <button id="no">No 💔</button>
  </div>

  <div id="message"></div>

  <script>
    const messages = [
      "¿Segura? 😢",
      "Piénsalo otra vez 🥺",
      "¿De verdad? 😭",
      "Vamos, será divertido ❤️",
      "No me rompas el corazón 💔",
      "Última oportunidad 😭",
      "¿Y si dices que sí? 😏",
      "No puedes escapar 😈"
    ];

    let index = 0;

    const noButton = document.getElementById("no");
    const message = document.getElementById("message");
    const yesButton = document.getElementById("yes");

    function moveButton() {
      const x = Math.random() * (window.innerWidth - 120);
      const y = Math.random() * (window.innerHeight - 120);

      noButton.style.left = x + "px";
      noButton.style.top = y + "px";
    }

    noButton.addEventListener("mouseover", () => {
      message.textContent = messages[index];
      index = (index + 1) % messages.length;
      moveButton();
    });

    noButton.addEventListener("click", (e) => {
      e.preventDefault();
      message.textContent = messages[index];
      index = (index + 1) % messages.length;
      moveButton();
    });

    yesButton.addEventListener("click", () => {
      document.body.innerHTML = "<h1>💖 Sabía que dirías que sí 💖</h1>";
    });
  </script>

</body>
</html>
