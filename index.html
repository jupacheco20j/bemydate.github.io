<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>💖 Una pregunta importante</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffe6f0;
      text-align: center;
      height: 100vh;
      overflow: hidden;
    }

    h1 {
      color: #ff4d88;
      font-size: 40px;
      margin-top: 80px;
      position: relative;
      z-index: 2;
    }

    .buttons {
      margin-top: 40px;
      position: relative;
      z-index: 2;
    }

    button {
      font-size: 20px;
      padding: 12px 25px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    #yes {
      background: #4CAF50;
      color: white;
    }

    #no {
      background: #ff4d4d;
      color: white;
      position: absolute;
      z-index: 999;
    }

    #message {
      margin-top: 20px;
      font-size: 22px;
      color: #333;
      position: relative;
      z-index: 2;
    }

    #result {
      margin-top: 20px;
      position: relative;
      z-index: 2;
      display: none;
    }

    #result h2 {
      color: #ff4d88;
    }

    #result p {
      font-size: 18px;
    }

    #result img {
      margin-top: 15px;
      width: 250px;
      border-radius: 15px;
    }

    /* ❤️ corazones */
    .heart {
      position: absolute;
      color: #ff4d88;
      font-size: 20px;
      animation: floatUp 6s linear forwards;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-110vh) scale(1.5); opacity: 0; }
    }

    /* 💥 explosión */
    .boom-heart {
      position: fixed;
      font-size: 24px;
      color: #ff4d88;
      pointer-events: none;
      z-index: 9999;
      animation: boom 1.2s ease-out forwards;
    }

    @keyframes boom {
      0% { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--x), var(--y)) scale(2); opacity: 0; }
    }
  </style>
</head>

<body>

  <h1>¿Quieres salir conmigo? 💕</h1>

  <div class="buttons">
    <button id="yes">Sí 💖</button>
    <button id="no">No 💔</button>
  </div>

  <div id="message"></div>

  <div id="result">
    <h2>💖 ¡Sabía que dirías que sí! 💖</h2>
    <p><b>📅 Fecha:</b> 26/06/2026</p>
    <p><b>🕒 Hora:</b> 3:00 PM</p>
    <p><b>📍 Punto de recogida:</b> Edificio Millenium</p>

    <img src="https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif" alt="gatitos">
  </div>

  <script>
    const messages = [
      "¿Segura? 😢",
      "Piénsalo otra vez 🥺",
      "¿De verdad? 😭",
      "Vamos, será divertido ❤️",
      "No me rompas el corazón 💔",
      "Última oportunidad 😭",
      "¿Y si dices que sí? 😏",
      "No puedes escapar 😈"
    ];

    let index = 0;

    const noButton = document.getElementById("no");
    const message = document.getElementById("message");
    const yesButton = document.getElementById("yes");
    const result = document.getElementById("result");

    function showMessage() {
      message.textContent = messages[index];
      index = (index + 1) % messages.length;
    }

    function moveButton() {
      const padding = 80;
      const x = Math.random() * (window.innerWidth - padding);
      const y = Math.random() * (window.innerHeight - padding);

      noButton.style.left = x + "px";
      noButton.style.top = y + "px";
    }

    // ❌ botón NO imposible
    ["mouseenter","mouseover","click","touchstart","pointerdown"].forEach(evt => {
      noButton.addEventListener(evt, (e) => {
        e.preventDefault();
        showMessage();
        moveButton();
      });
    });

    // ❤️ corazones flotando
    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "❤️";

      heart.style.left = Math.random() * window.innerWidth + "px";
      heart.style.top = window.innerHeight + "px";
      heart.style.fontSize = (15 + Math.random() * 25) + "px";
      heart.style.animationDuration = (4 + Math.random() * 3) + "s";

      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 7000);
    }

    setInterval(createHeart, 150);

    // 💥 explosión de corazones
    function heartExplosion() {
      for (let i = 0; i < 60; i++) {
        const heart = document.createElement("div");
        heart.classList.add("boom-heart");
        heart.innerHTML = "❤️";

        const x = (Math.random() - 0.5) * 800 + "px";
        const y = (Math.random() - 0.5) * 800 + "px";

        heart.style.left = "50%";
        heart.style.top = "50%";
        heart.style.setProperty("--x", x);
        heart.style.setProperty("--y", y);

        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 1200);
      }
    }

    // 💖 botón sí
    yesButton.addEventListener("click", () => {
      heartExplosion();

      setTimeout(() => {
        document.querySelector(".buttons").style.display = "none";
        document.getElementById("message").style.display = "none";
        document.getElementById("result").style.display = "block";
      }, 700);
    });

    moveButton();
  </script>

</body>
</html>
